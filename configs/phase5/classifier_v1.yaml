version: 2
temporal_split:
  train_end: "2016-12-31"
  validation_end: "2017-12-31"
  test_end: "2018-09-30"
  target_horizon_days: 365
classifier:
  random_state: 42
  xgb_n_estimators: 400
  xgb_max_depth: 5
  xgb_learning_rate: 0.05
  xgb_subsample: 0.9
  xgb_colsample_bytree: 0.9
  xgb_min_child_weight: 5
  mlp_hidden_layer_sizes: [128, 64]
  mlp_max_iter: 200
inputs:
  phase3_directory: data/interim/phase3/v1
  embeddings_path: artifacts/phase4/v1/entity_embeddings.parquet
output_directory: artifacts/phase5/v1
metrics:
  primary: pr_auc
  required:
    - accuracy
    - roc_auc
    - f1
    - pr_auc
notes:
  - Primary model is XGBoost with scale_pos_weight for class imbalance.
  - MLP is a dense-embedding comparator only.
  - Select the model on validation PR-AUC, tune the decision threshold on validation F1, then evaluate test once.
  - Features are GraphSAGE embeddings only; labels remain next-inspection Fail within 365 days.
